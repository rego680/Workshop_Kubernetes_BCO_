###############################################
# Service: Paraiso — NodePort en puerto 32767
# Archivo: paraiso-service.yaml
#
# Expone el Pod "Paraiso" en el puerto 32767
# Namespace: kube-public
#
# Flujo del tráfico:
#   Cliente → <IP_SERVIDOR>:32767 → Service:80 → Pod:80
#
# Despliegue:
#   kubectl apply -f paraiso-service.yaml
#   kubectl get svc -n kube-public
#
# Acceso con port-forward (minikube):
#   kubectl port-forward --address 0.0.0.0 \
#     -n kube-public svc/paraiso-svc 32767:80 &
#
# Limpiar:
#   kubectl delete -f paraiso-service.yaml
###############################################
apiVersion: v1
kind: Service
metadata:
  name: paraiso-svc
  namespace: kube-public
  labels:
    app: paraiso
spec:
  type: NodePort
  selector:
    app: paraiso
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 32767
