###############################################
# LAB 1 — UNIDAD 4: Secret
# Archivo: lab1-secret.yaml
#
# Un Secret almacena datos SENSIBLES como
# credenciales, tokens o claves. Los valores
# se codifican en base64 (NO es encriptacion).
#
# IMPORTANTE:
#   base64 NO es seguridad. Cualquiera puede
#   decodificar los valores. En produccion se usa
#   encriptacion at-rest (EncryptionConfiguration)
#   o herramientas como Vault, Sealed Secrets, etc.
#
# Despliegue:
#   kubectl apply -f lab1-secret.yaml
#   kubectl get secret app-secret
#   kubectl describe secret app-secret
#
# Ver valores decodificados:
#   kubectl get secret app-secret -o jsonpath='{.data.DB_PASSWORD}' | base64 -d
#
# Limpiar:
#   kubectl delete -f lab1-secret.yaml
###############################################

apiVersion: v1
kind: Secret

metadata:
  name: app-secret
  labels:
    app: webapp-lab1
    lab: unidad4-lab1

# ═══════════════════════════════════════════
# type — tipo de Secret:
#
#   Opaque              → datos arbitrarios (default)
#   kubernetes.io/tls   → certificados TLS
#   kubernetes.io/dockerconfigjson → credenciales de registry
#   kubernetes.io/basic-auth       → usuario/password
# ═══════════════════════════════════════════
type: Opaque

# ═══════════════════════════════════════════
# data — valores codificados en base64
#
# Para codificar un valor:
#   echo -n "mi-password" | base64
#   → bWktcGFzc3dvcmQ=
#
# Para decodificar:
#   echo "bWktcGFzc3dvcmQ=" | base64 -d
#   → mi-password
# ═══════════════════════════════════════════
data:
  DB_USER: "YWRtaW4="                   # admin
  DB_PASSWORD: "UzNjdXIxdHlLOHMh"       # S3cur1tyK8s!
  API_KEY: "YWJjZGVmMTIzNDU2Nzg5MA=="   # abcdef1234567890
