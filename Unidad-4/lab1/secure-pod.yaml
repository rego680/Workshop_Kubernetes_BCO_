# ============================================================
# LAB 1 - SEGURO: ServiceAccount Token Protegido
# ============================================================
# ✅ SOLUCIÓN:
#   1. automountServiceAccountToken: false — no monta token
#   2. ServiceAccount dedicado con permisos mínimos
#   3. securityContext hardened (non-root, read-only, drop ALL)
#   4. Recursos limitados
#
# Ejecutar en minikube:
#   kubectl apply -f secure-pod.yaml
#   kubectl exec -it app-secure -n lab1-token -- bash
#   # Dentro del pod:
#   ls /var/run/secrets/  → NO EXISTE (token no montado)
# ============================================================
apiVersion: v1
kind: Namespace
metadata:
  name: lab1-token
  labels:
    pod-security.kubernetes.io/enforce: baseline
---
# ✅ ServiceAccount dedicado sin auto-mount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secure-app-sa
  namespace: lab1-token
automountServiceAccountToken: false
---
apiVersion: v1
kind: Pod
metadata:
  name: app-secure
  namespace: lab1-token
  labels:
    app: secure-app
spec:
  serviceAccountName: secure-app-sa
  automountServiceAccountToken: false    # ✅ Doble protección
  containers:
    - name: webapp
      image: nginxinc/nginx-unprivileged:1.25
      ports:
        - containerPort: 8080
      securityContext:
        runAsNonRoot: true               # ✅ No corre como root
        runAsUser: 101                   # ✅ Usuario nginx
        readOnlyRootFilesystem: true     # ✅ Filesystem de solo lectura
        allowPrivilegeEscalation: false  # ✅ Sin escalación
        capabilities:
          drop: ["ALL"]                  # ✅ Sin capabilities
        seccompProfile:
          type: RuntimeDefault
      resources:
        limits:
          memory: "128Mi"
          cpu: "250m"
        requests:
          memory: "64Mi"
          cpu: "100m"
      volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /var/cache/nginx
        - name: run
          mountPath: /var/run
  volumes:
    - name: tmp
      emptyDir: {}
    - name: cache
      emptyDir: {}
    - name: run
      emptyDir: {}
