# ============================================================
# LAB 1 - VULNERABLE: Token de ServiceAccount Expuesto
# ============================================================
# ⚠ PROBLEMA: El Pod monta automáticamente el token del SA
#   default, permitiendo que un atacante acceda al API Server
#   si logra RCE (Remote Code Execution) en el contenedor.
#
# Ejecutar:
#   kubectl apply -f vulnerable-pod.yaml
#   kubectl apply -f secrets-lab.yaml
#   kubectl apply -f role-binding-vulnerable.yaml
#   kubectl exec -it app-vulnerable -n lab1-token -- bash
#   # Dentro del pod:
#   cat /var/run/secrets/kubernetes.io/serviceaccount/token
#   curl -sk https://$KUBERNETES_SERVICE_HOST/api/v1/namespaces/lab1-token/secrets \
#     -H "Authorization: Bearer $(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
# ============================================================
apiVersion: v1
kind: Namespace
metadata:
  name: lab1-token
---
apiVersion: v1
kind: Pod
metadata:
  name: app-vulnerable
  namespace: lab1-token
  labels:
    app: vulnerable-app
spec:
  # ⚠ No se especifica automountServiceAccountToken: false
  # ⚠ No se especifica un SA restringido — usa "default"
  containers:
    - name: webapp
      image: nginx:1.25
      ports:
        - containerPort: 80
      # ⚠ No hay securityContext → corre como root
      # ⚠ No hay readOnlyRootFilesystem
      # ⚠ No hay recursos limitados
