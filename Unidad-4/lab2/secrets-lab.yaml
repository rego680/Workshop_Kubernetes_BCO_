# ============================================================
# Secrets de ejemplo para Lab 2 — Simulan datos sensibles
# ============================================================
# Estos secrets representan credenciales que un atacante podria
# exfiltrar si obtiene RCE en un pod con token montado.
#
# Aplicar:  kubectl apply -f secrets-lab.yaml
# Revertir: kubectl delete -f secrets-lab.yaml
# ============================================================

