###############################################
# LAB 3 — UNIDAD 4: Aplicaciones Frontend y Backend
# Archivo: lab3-apps.yaml
#
# Despliega dos aplicaciones en namespaces separados:
#   - web-frontend (nginx) en namespace "frontend"
#   - api-backend (httpd) en namespace "backend"
#
# Sin Network Policies, ambos pueden comunicarse
# libremente. Despues aplicaremos restricciones.
#
# Despliegue:
#   kubectl apply -f lab3-apps.yaml
#   kubectl get pods -n frontend
#   kubectl get pods -n backend
#
# Limpiar:
#   kubectl delete -f lab3-apps.yaml
###############################################

# ═══════════════════════════════════════════
# FRONTEND — Nginx (simula app web publica)
# ═══════════════════════════════════════════
apiVersion: v1
kind: Pod
metadata:
  name: web-frontend
  namespace: frontend
  labels:
    app: web-frontend
    role: frontend
spec:
  containers:
  - name: nginx
    image: nginx:1.25-alpine
    ports:
    - containerPort: 80
    resources:
      requests:
        memory: "32Mi"
        cpu: "50m"
      limits:
        memory: "64Mi"
        cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: web-frontend-svc
  namespace: frontend
  labels:
    app: web-frontend
spec:
  selector:
    app: web-frontend
  ports:
  - port: 80
    targetPort: 80
---
# ═══════════════════════════════════════════
# BACKEND — Apache (simula API/DB interna)
# ═══════════════════════════════════════════
apiVersion: v1
kind: Pod
metadata:
  name: api-backend
  namespace: backend
  labels:
    app: api-backend
    role: backend
spec:
  containers:
  - name: httpd
    image: httpd:2.4-alpine
    ports:
    - containerPort: 80
    resources:
      requests:
        memory: "32Mi"
        cpu: "50m"
      limits:
        memory: "64Mi"
        cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-backend-svc
  namespace: backend
  labels:
    app: api-backend
spec:
  selector:
    app: api-backend
  ports:
  - port: 80
    targetPort: 80
---
# ═══════════════════════════════════════════
# POD DE PRUEBA — para testear conectividad
# Un Pod con curl instalado en el namespace default
# ═══════════════════════════════════════════
apiVersion: v1
kind: Pod
metadata:
  name: test-client
  namespace: default
  labels:
    app: test-client
    role: tester
spec:
  containers:
  - name: curl
    image: curlimages/curl:latest
    command: ["sleep", "3600"]
    resources:
      requests:
        memory: "16Mi"
        cpu: "25m"
      limits:
        memory: "32Mi"
        cpu: "50m"
