# ============================================================
# LAB 3 - SEGURO: Secrets Montados como Volumen + Cifrado
# ============================================================
# ✅ SOLUCIÓN:
#   1. Montar como volumen en vez de env vars
#   2. readOnly mount
#   3. En producción: External Secrets + Vault + etcd encryption
# ============================================================
apiVersion: v1
kind: Namespace
metadata:
  name: lab3-secrets
  labels:
    pod-security.kubernetes.io/enforce: restricted
---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: lab3-secrets
type: Opaque
data:
  DB_HOST: cG9zdGdyZXMuZGVmYXVsdC5zdmMuY2x1c3Rlci5sb2NhbA==
  DB_USER: YWRtaW4=
  DB_PASSWORD: U3VwM3JTZWNyZXRQQHNzdzByZCEyMDI0
  DB_NAME: cHJvZHVjdGlvbl9kYg==
---
apiVersion: v1
kind: Pod
metadata:
  name: app-secure-secrets
  namespace: lab3-secrets
spec:
  automountServiceAccountToken: false
  containers:
    - name: app
      image: nginxinc/nginx-unprivileged:1.25   # ✅ Imagen non-root compatible
      # ✅ NO usar envFrom — montar como volumen
      volumeMounts:
        - name: db-creds
          mountPath: /etc/secrets/db
          readOnly: true              # ✅ Solo lectura
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /var/cache/nginx
        - name: run
          mountPath: /var/run
      securityContext:
        runAsNonRoot: true
        runAsUser: 101                  # ✅ Usuario nginx (unprivileged)
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
      resources:
        limits:
          memory: "128Mi"
          cpu: "250m"
  volumes:
    - name: db-creds
      secret:
        secretName: db-credentials
        defaultMode: 0400             # ✅ Permisos restrictivos
    - name: tmp
      emptyDir: {}
    - name: cache
      emptyDir: {}
    - name: run
      emptyDir: {}
