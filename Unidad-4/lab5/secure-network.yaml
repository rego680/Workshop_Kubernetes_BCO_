# ============================================================
# LAB 5 - SEGURO: NetworkPolicies + Redis con Autenticación
# ============================================================
# ✅ SOLUCIÓN:
#   1. NetworkPolicy deny-all por defecto
#   2. NetworkPolicy allow solo webapp → redis
#   3. Redis con requirepass
#   4. Pods con labels para control de acceso
#
# Prerequisito en minikube:
#   minikube start --cni=calico
#
# Ejecutar:
#   kubectl apply -f secure-network.yaml
#   # Probar que webapp SÍ puede conectar:
#   kubectl logs webapp-secure -n lab5-network
#   # Probar que attacker NO puede conectar:
#   kubectl exec -it attacker-blocked -n lab5-network -- sh
#   redis-cli -h redis-secure.lab5-network.svc.cluster.local PING
#   → Connection timed out (bloqueado por NetworkPolicy)
# ============================================================
apiVersion: v1
kind: Namespace
metadata:
  name: lab5-network
  labels:
    pod-security.kubernetes.io/enforce: baseline
---
# ✅ ConfigMap con configuración segura de Redis
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: lab5-network
data:
  redis.conf: |
    requirepass S3cur3R3d1sP@ss!
    bind 0.0.0.0
    protected-mode yes
    maxmemory 64mb
    maxmemory-policy allkeys-lru
---
# ✅ Secret con password de Redis
apiVersion: v1
kind: Secret
metadata:
  name: redis-password
  namespace: lab5-network
type: Opaque
data:
  REDIS_PASSWORD: UzNjdXIzUjNkMXNQQHNzIQ==   # S3cur3R3d1sP@ss!
---
# ✅ Redis CON autenticación
apiVersion: v1
kind: Pod
metadata:
  name: redis-secure
  namespace: lab5-network
  labels:
    app: redis-secure
    role: database
spec:
  containers:
    - name: redis
      image: redis:7-alpine
      ports:
        - containerPort: 6379
      command: ["redis-server", "/etc/redis/redis.conf"]
      volumeMounts:
        - name: redis-config
          mountPath: /etc/redis
          readOnly: true
        - name: data
          mountPath: /data
      resources:
        limits:
          memory: "128Mi"
          cpu: "250m"
  volumes:
    - name: redis-config
      configMap:
        name: redis-config
    - name: data
      emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: redis-secure
  namespace: lab5-network
spec:
  selector:
    app: redis-secure
  ports:
    - port: 6379
      targetPort: 6379
---
# ✅ App legítima con password
apiVersion: v1
kind: Pod
metadata:
  name: webapp-secure
  namespace: lab5-network
  labels:
    app: webapp-secure
    role: frontend
spec:
  containers:
    - name: app
      image: redis:7-alpine
      command: ["sh", "-c", "while true; do redis-cli -h redis-secure -a $REDIS_PASSWORD SET app-status online EX 30 2>/dev/null; sleep 10; done"]
      env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-password
              key: REDIS_PASSWORD
---
# Pod atacante (para demostrar que queda bloqueado)
apiVersion: v1
kind: Pod
metadata:
  name: attacker-blocked
  namespace: lab5-network
  labels:
    app: attacker
    role: recon
spec:
  containers:
    - name: tools
      image: redis:7-alpine
      command: ["sleep", "infinity"]
---
# ════════════════════════════════════════════════
# NETWORK POLICIES
# ════════════════════════════════════════════════

# ✅ 1. Deny-all ingress por defecto en el namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: lab5-network
spec:
  podSelector: {}            # ✅ Aplica a TODOS los pods
  policyTypes:
    - Ingress
    - Egress
---
# ✅ 2. Permitir solo webapp → redis
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-webapp-to-redis
  namespace: lab5-network
spec:
  podSelector:
    matchLabels:
      app: redis-secure       # ✅ Aplica al pod Redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: webapp-secure    # ✅ Solo desde webapp
      ports:
        - protocol: TCP
          port: 6379
---
# ✅ 3. Permitir egress de webapp a redis y DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-webapp-egress
  namespace: lab5-network
spec:
  podSelector:
    matchLabels:
      app: webapp-secure
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: redis-secure
      ports:
        - protocol: TCP
          port: 6379
    - to:                       # ✅ Permitir DNS
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
