# ============================================================
# LAB 1 - VULNERABLE: Abuso de CAP_NET_RAW
# ============================================================
# ⚠ PROBLEMA:
#   - Pod con CAP_NET_RAW y CAP_NET_ADMIN
#   - Tráfico HTTP sin cifrar entre microservicios
#   - Sin NetworkPolicy → puede sniffear todo el namespace
#   - Sin mTLS → credenciales viajan en texto plano
# ============================================================
apiVersion: v1
kind: Namespace
metadata:
  name: lab1-caps
---
# ⚠ Microservicio "backend-api" que recibe credenciales via HTTP
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-api-code
  namespace: lab1-caps
data:
  server.py: |
    from http.server import HTTPServer, BaseHTTPRequestHandler
    import json

    class Handler(BaseHTTPRequestHandler):
        def do_POST(self):
            length = int(self.headers.get('Content-Length', 0))
            body = self.rfile.read(length).decode()
            print(f"[LOGIN] Received: {body}", flush=True)
            # Simula respuesta con token
            response = json.dumps({
                "status": "ok",
                "token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.SECRET_DATA"
            })
            self.send_response(200)
            self.send_header('Content-Type', 'application/json')
            self.end_headers()
            self.wfile.write(response.encode())

        def do_GET(self):
            self.send_response(200)
            self.send_header('Content-Type', 'application/json')
            self.end_headers()
            self.wfile.write(b'{"status":"healthy"}')

        def log_message(self, format, *args):
            pass  # Silenciar logs HTTP

    HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
---
apiVersion: v1
kind: Pod
metadata:
  name: backend-api
  namespace: lab1-caps
  labels:
    app: backend-api
spec:
  containers:
    - name: api
      image: python:3.11-slim
      command: ["python", "/app/server.py"]
      ports:
        - containerPort: 8080
      volumeMounts:
        - name: code
          mountPath: /app
      resources:
        limits:
          memory: "128Mi"
          cpu: "250m"
  volumes:
    - name: code
      configMap:
        name: backend-api-code
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api
  namespace: lab1-caps
spec:
  selector:
    app: backend-api
  ports:
    - port: 8080
      targetPort: 8080
---
# ⚠ Microservicio "frontend" que envía credenciales al backend via HTTP plano
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-code
  namespace: lab1-caps
data:
  client.sh: |
    #!/bin/bash
    # Simula un frontend enviando login requests cada 10 segundos
    while true; do
      echo "[CLIENT] Sending login request..."
      curl -s -X POST http://backend-api.lab1-caps.svc:8080/api/login \
        -H "Content-Type: application/json" \
        -d '{"username":"admin@empresa.com","password":"Sup3rS3cr3t!","api_key":"sk-live-abcdef123456"}'
      sleep 10
    done
---
apiVersion: v1
kind: Pod
metadata:
  name: frontend-client
  namespace: lab1-caps
  labels:
    app: frontend
spec:
  containers:
    - name: client
      image: curlimages/curl:latest
      command: ["/bin/sh", "/app/client.sh"]
      volumeMounts:
        - name: code
          mountPath: /app
      resources:
        limits:
          memory: "64Mi"
          cpu: "100m"
  volumes:
    - name: code
      configMap:
        name: frontend-code
---
# ⚠ Pod ATACANTE con CAP_NET_RAW + CAP_NET_ADMIN
apiVersion: v1
kind: Pod
metadata:
  name: sniffer-pod
  namespace: lab1-caps
  labels:
    app: sniffer
spec:
  containers:
    - name: sniffer
      image: nicolaka/netshoot
      command: ["sleep", "infinity"]
      securityContext:
        capabilities:
          add: ["NET_RAW", "NET_ADMIN"]   # ⚠ Permite tcpdump, arpspoof
      # ⚠ Sin readOnlyRootFilesystem
      # ⚠ Sin runAsNonRoot
      # ⚠ Sin resource limits restrictivos
      resources:
        limits:
          memory: "256Mi"
          cpu: "500m"
# ⚠ Sin NetworkPolicy → sniffer puede ver todo el tráfico
# ⚠ Sin mTLS → tráfico HTTP en texto plano
