# ============================================================
# Lab 1: SSRF & Acceso a Cloud Metadata — Escenario VULNERABLE
# Workshop Ciberseguridad Kubernetes — Unidad 5
# ============================================================
# PROPÓSITO: Demostrar cómo una vulnerabilidad SSRF en una
# app permite acceder al IMDS (169.254.169.254) y robar
# credenciales IAM del nodo cloud
# ============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: lab1-ssrf
  labels:
    lab: "1"
    scenario: vulnerable

---
# --- ConfigMap con la app vulnerable a SSRF ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ssrf-app-code
  namespace: lab1-ssrf
data:
  app.py: |
    from http.server import HTTPServer, BaseHTTPRequestHandler
    from urllib.parse import urlparse, parse_qs
    import urllib.request
    import urllib.error
    import json
    import html

    class SSRFHandler(BaseHTTPRequestHandler):
        def do_GET(self):
            parsed = urlparse(self.path)
            if parsed.path == '/':
                self.send_response(200)
                self.send_header('Content-Type', 'text/html')
                self.end_headers()
                self.wfile.write(b'''
                <html>
                <head><title>URL Fetcher</title>
                <style>
                  body { font-family: Arial; background: #0D1117; color: #F0F6FC; padding: 40px; }
                  input { width: 500px; padding: 10px; font-size: 16px; }
                  button { padding: 10px 20px; background: #238636; color: white; border: none; cursor: pointer; }
                  pre { background: #161B22; padding: 20px; border-radius: 8px; overflow-x: auto; }
                </style>
                </head>
                <body>
                  <h1>URL Fetcher Service</h1>
                  <p>Ingresa una URL para obtener su contenido:</p>
                  <form action="/fetch" method="GET">
                    <input type="text" name="url" placeholder="https://example.com" />
                    <button type="submit">Fetch</button>
                  </form>
                </body></html>
                ''')
            elif parsed.path == '/fetch':
                params = parse_qs(parsed.query)
                url = params.get('url', [''])[0]
                if not url:
                    self.send_response(400)
                    self.send_header('Content-Type', 'application/json')
                    self.end_headers()
                    self.wfile.write(json.dumps({"error": "Parametro 'url' requerido"}).encode())
                    return
                try:
                    # VULNERABLE: No valida la URL del usuario
                    # Un atacante puede redirigir a 169.254.169.254
                    req = urllib.request.Request(url)
                    with urllib.request.urlopen(req, timeout=5) as response:
                        data = response.read().decode('utf-8', errors='replace')
                        safe_url = html.escape(url)
                        safe_data = html.escape(data)
                        body = f'''
                        <html><head><title>Resultado</title>
                        <style>
                          body {{ font-family: Arial; background: #0D1117; color: #F0F6FC; padding: 40px; }}
                          pre {{ background: #161B22; padding: 20px; border-radius: 8px; overflow-x: auto; color: #10B981; }}
                          a {{ color: #3B82F6; }}
                        </style></head><body>
                        <h2>Resultado de: {safe_url}</h2>
                        <pre>{safe_data}</pre>
                        <br><a href="/">Volver</a>
                        </body></html>
                        '''
                        self.send_response(200)
                        self.send_header('Content-Type', 'text/html')
                        self.end_headers()
                        self.wfile.write(body.encode())
                except Exception as e:
                    self.send_response(500)
                    self.send_header('Content-Type', 'application/json')
                    self.end_headers()
                    self.wfile.write(json.dumps({"error": str(e)}).encode())
            else:
                self.send_response(404)
                self.end_headers()

    if __name__ == '__main__':
        server = HTTPServer(('0.0.0.0', 8080), SSRFHandler)
        print("SSRF Vulnerable App running on port 8080")
        server.serve_forever()

---
# --- ConfigMap con el simulador de IMDS (fake metadata service) ---
# Simula el Instance Metadata Service de AWS (169.254.169.254)
# para que el lab funcione en entornos locales (minikube, kind, etc.)
apiVersion: v1
kind: ConfigMap
metadata:
  name: fake-imds-code
  namespace: lab1-ssrf
data:
  imds.py: |
    from http.server import HTTPServer, BaseHTTPRequestHandler
    import json
    import datetime

    # Datos simulados del IMDS de AWS
    METADATA = {
        "/latest/meta-data/": "ami-id\nami-launch-index\nhostname\ninstance-id\ninstance-type\nlocal-ipv4\npublic-ipv4\niam/\nsecurity-groups\nplacement/",
        "/latest/meta-data/ami-id": "ami-0abcdef1234567890",
        "/latest/meta-data/instance-id": "i-0a1b2c3d4e5f67890",
        "/latest/meta-data/instance-type": "m5.xlarge",
        "/latest/meta-data/hostname": "ip-172-31-16-42.ec2.internal",
        "/latest/meta-data/local-ipv4": "172.31.16.42",
        "/latest/meta-data/public-ipv4": "54.123.45.67",
        "/latest/meta-data/security-groups": "production-web-sg",
        "/latest/meta-data/placement/": "availability-zone\nregion",
        "/latest/meta-data/placement/availability-zone": "us-east-1a",
        "/latest/meta-data/placement/region": "us-east-1",
        "/latest/meta-data/iam/": "info\nsecurity-credentials/",
        "/latest/meta-data/iam/info": json.dumps({
            "Code": "Success",
            "InstanceProfileArn": "arn:aws:iam::123456789012:instance-profile/production-eks-node-role",
            "InstanceProfileId": "AIPA1234567890EXAMPLE"
        }, indent=2),
        "/latest/meta-data/iam/security-credentials/": "production-eks-node-role",
        "/latest/meta-data/iam/security-credentials/production-eks-node-role": json.dumps({
            "Code": "Success",
            "LastUpdated": "2024-01-15T12:30:00Z",
            "Type": "AWS-HMAC",
            "AccessKeyId": "AKIA3EXAMPLE7890FAKE",
            "SecretAccessKey": "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY",
            "Token": "FwoGZXIvYXdzEBAaDFakeTokenForDemoOnly...==",
            "Expiration": "2024-01-15T18:30:00Z"
        }, indent=2),
    }

    class IMDSHandler(BaseHTTPRequestHandler):
        def do_GET(self):
            path = self.path
            if path in METADATA:
                self.send_response(200)
                self.send_header("Content-Type", "text/plain")
                self.end_headers()
                self.wfile.write(METADATA[path].encode())
            else:
                self.send_response(404)
                self.send_header("Content-Type", "text/plain")
                self.end_headers()
                self.wfile.write(b"Not Found")

        def log_message(self, format, *args):
            print(f"[IMDS] {args[0]}")

    if __name__ == "__main__":
        server = HTTPServer(("0.0.0.0", 80), IMDSHandler)
        print("Fake IMDS running on port 80")
        server.serve_forever()

---
# --- Deployment del simulador IMDS ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fake-imds
  namespace: lab1-ssrf
  labels:
    app: fake-imds
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fake-imds
  template:
    metadata:
      labels:
        app: fake-imds
    spec:
      containers:
        - name: imds
          image: python:3.11-slim
          imagePullPolicy: IfNotPresent
          command: ["python", "/app/imds.py"]
          ports:
            - containerPort: 80
          volumeMounts:
            - name: imds-code
              mountPath: /app
      volumes:
        - name: imds-code
          configMap:
            name: fake-imds-code

---
# --- Service del simulador IMDS ---
# Nombre DNS interno: fake-imds.lab1-ssrf.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: fake-imds
  namespace: lab1-ssrf
spec:
  selector:
    app: fake-imds
  ports:
    - port: 80
      targetPort: 80

---
# --- Deployment vulnerable ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ssrf-app
  namespace: lab1-ssrf
  labels:
    app: ssrf-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ssrf-app
  template:
    metadata:
      labels:
        app: ssrf-app
    spec:
      containers:
        - name: webapp
          image: python:3.11-slim
          imagePullPolicy: IfNotPresent
          command: ["python", "/app/app.py"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: app-code
              mountPath: /app
          # ⚠ Sin NetworkPolicy egress
          # ⚠ Puede alcanzar 169.254.169.254
      volumes:
        - name: app-code
          configMap:
            name: ssrf-app-code

---
# --- Service para exponer la app ---
apiVersion: v1
kind: Service
metadata:
  name: ssrf-app-svc
  namespace: lab1-ssrf
spec:
  type: NodePort
  selector:
    app: ssrf-app
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 31082
