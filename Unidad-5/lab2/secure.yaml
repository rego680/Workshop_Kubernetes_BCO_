# ============================================================
# Lab 2: hostPath Abuse — Escenario SEGURO
# Workshop Ciberseguridad Kubernetes — Unidad 5
# ============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: lab3-hostpath
  labels:
    lab: "3"
    scenario: secure
    # ✅ Pod Security Admission: restricted
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted

---
# --- Pod seguro: sin hostPath, distroless, non-root ---
apiVersion: v1
kind: Pod
metadata:
  name: secure-app
  namespace: lab3-hostpath
  labels:
    app: secure-app
spec:
  automountServiceAccountToken: false    # ✅
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault               # ✅ Seccomp activo
  containers:
    - name: app
      image: nginx:alpine
      ports:
        - containerPort: 80
      securityContext:
        readOnlyRootFilesystem: true     # ✅
        allowPrivilegeEscalation: false  # ✅
        capabilities:
          drop: ["ALL"]                  # ✅
      volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /var/cache/nginx
        - name: run
          mountPath: /var/run
      resources:
        limits:
          cpu: "200m"
          memory: "128Mi"
  volumes:
    # ✅ Solo volúmenes emptyDir — NO hostPath
    - name: tmp
      emptyDir: {}
    - name: cache
      emptyDir: {}
    - name: run
      emptyDir: {}

---
# --- Kyverno Policy: bloquear hostPath ---
# (Aplicar solo si tienes Kyverno instalado)
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: deny-host-path
  annotations:
    policies.kyverno.io/title: Deny hostPath Volumes
    policies.kyverno.io/description: Bloquea el uso de volúmenes hostPath en pods
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: deny-hostpath-volumes
      match:
        any:
          - resources:
              kinds: ["Pod"]
      validate:
        message: >-
          Los volúmenes hostPath no están permitidos por política de seguridad.
          Use emptyDir, PVC o ConfigMap en su lugar.
        pattern:
          spec:
            =(volumes):
              - X(hostPath): "null"
