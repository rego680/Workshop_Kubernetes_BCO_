; ==============================================
; Configuración PHP para DVWA - Lab 4
; ⚠️  SOLO PARA LABORATORIO
; ==============================================

; Permitir uploads de archivos (necesario para File Upload vuln)
file_uploads = On
upload_max_filesize = 10M
post_max_size = 12M

; Permitir ejecución de URLs remotas (necesario para RFI)
allow_url_include = On
allow_url_fopen = On

; Mostrar errores (útil para aprendizaje)
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

; Limites de memoria y tiempo
max_execution_time = 60
memory_limit = 256M

; Zona horaria
date.timezone = "America/Mexico_City"
