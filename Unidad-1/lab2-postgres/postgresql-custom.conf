# ============================================================
# Lab 2 - Unidad 1: Configuracion personalizada de PostgreSQL
# Se copia a /etc/postgresql/custom.conf
# ============================================================

# Logging
log_statement = 'all'
log_connections = on
log_disconnections = on
log_duration = on

# Rendimiento (ajustado para lab/desarrollo)
shared_buffers = 64MB
work_mem = 4MB
maintenance_work_mem = 32MB

# Conexiones
max_connections = 50
