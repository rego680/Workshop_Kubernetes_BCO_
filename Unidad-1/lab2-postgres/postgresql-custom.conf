# =============================================
# Lab 2: Configuración personalizada de PostgreSQL
# Optimizada para entorno de laboratorio/desarrollo
# =============================================

# --- Conexiones ---
listen_addresses = '*'
max_connections = 50

# --- Memoria ---
shared_buffers = 128MB
work_mem = 4MB
maintenance_work_mem = 64MB

# --- Logging ---
log_destination = 'stderr'
logging_collector = off
log_statement = 'all'
log_duration = on
log_min_duration_statement = 0
log_line_prefix = '%t [%p] %u@%d '
log_timezone = 'UTC'

# --- Locale ---
timezone = 'UTC'
lc_messages = 'en_US.utf8'

# --- Rendimiento (desarrollo) ---
synchronous_commit = off
fsync = off
full_page_writes = off

# NOTA: fsync=off y full_page_writes=off mejoran rendimiento
# pero NO deben usarse en producción (riesgo de corrupción de datos)
