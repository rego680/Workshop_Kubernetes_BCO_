<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - VulnFlask</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #00ff41; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #111; border: 1px solid #333; border-radius: 8px; padding: 30px; width: 380px; }
  h2 { text-align: center; margin-bottom: 5px; }
  .hint { text-align: center; color: #666; font-size: 0.7rem; margin-bottom: 20px; }
  label { display: block; margin-bottom: 4px; font-size: 0.85rem; }
  input[type="text"], input[type="password"] {
    width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid #333; color: #00ff41;
    border-radius: 4px; font-family: inherit; margin-bottom: 14px; font-size: 0.9rem;
  }
  button { width: 100%; padding: 10px; background: #00ff41; color: #000; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1rem; }
  button:hover { background: #00cc33; }
  .error { background: rgba(255,0,0,0.1); border: 1px solid #ff3333; color: #ff6666; padding: 10px; border-radius: 4px; margin-bottom: 14px; font-size: 0.8rem; word-break: break-all; }
  .back { display: block; text-align: center; margin-top: 15px; color: #555; text-decoration: none; font-size: 0.8rem; }
  .back:hover { color: #00ff41; }
</style>
</head>
<body>
<div class="card">
  <h2>Login</h2>
  <div class="hint">Vuln: SQL Injection &mdash; Payload: ' OR '1'='1' --</div>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <label>Username</label>
    <input type="text" name="username" placeholder="admin" autofocus>
    <label>Password</label>
    <input type="password" name="password" placeholder="password">
    <button type="submit">Iniciar Sesion</button>
  </form>
  <a class="back" href="/">Volver al menu</a>
</div>
</body>
</html>
