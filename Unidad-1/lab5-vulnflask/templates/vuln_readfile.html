<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Leer Archivo - VulnFlask</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #00ff41; min-height: 100vh; padding: 40px; }
  .container { max-width: 700px; margin: 0 auto; }
  h2 { margin-bottom: 5px; }
  .hint { color: #666; font-size: 0.7rem; margin-bottom: 20px; }
  form { display: flex; gap: 10px; margin-bottom: 20px; }
  input[type="text"] { flex: 1; padding: 10px; background: #1a1a1a; border: 1px solid #333; color: #00ff41; border-radius: 4px; font-family: inherit; }
  button { padding: 10px 20px; background: #00ff41; color: #000; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
  .error { background: rgba(255,0,0,0.1); border: 1px solid #ff3333; color: #ff6666; padding: 10px; border-radius: 4px; margin-bottom: 14px; font-size: 0.8rem; word-break: break-all; }
  .output { background: #111; border: 1px solid #333; border-radius: 8px; padding: 15px; white-space: pre-wrap; font-size: 0.8rem; max-height: 400px; overflow-y: auto; }
  .file-label { color: #888; font-size: 0.8rem; margin-bottom: 8px; }
  .back { color: #555; text-decoration: none; font-size: 0.8rem; }
  .back:hover { color: #00ff41; }
</style>
</head>
<body>
<div class="container">
  <h2>Lector de Archivos</h2>
  <div class="hint">Vuln: Path Traversal &mdash; Payload: ../../../../etc/passwd</div>
  <form method="GET">
    <input type="text" name="file" value="{{ filename }}" placeholder="Nombre de archivo (ej: notas.txt)" autofocus>
    <button type="submit">Leer</button>
  </form>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  {% if content %}
  <div class="file-label">Contenido de: {{ filename }}</div>
  <div class="output">{{ content }}</div>
  {% endif %}
  <br><a class="back" href="/">Volver al menu</a>
</div>
</body>
</html>
