<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mensajes - VulnFlask</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #00ff41; min-height: 100vh; padding: 40px; }
  .container { max-width: 700px; margin: 0 auto; }
  h2 { margin-bottom: 5px; }
  .hint { color: #666; font-size: 0.7rem; margin-bottom: 20px; }
  .post-form { background: #111; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
  label { display: block; margin-bottom: 4px; font-size: 0.8rem; color: #888; }
  input[type="text"], textarea {
    width: 100%; padding: 8px; background: #1a1a1a; border: 1px solid #333; color: #00ff41;
    border-radius: 4px; font-family: inherit; margin-bottom: 10px;
  }
  textarea { height: 80px; resize: vertical; }
  button { padding: 8px 20px; background: #00ff41; color: #000; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
  .message { background: #111; border: 1px solid #222; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
  .message .author { color: #00aaff; font-weight: bold; font-size: 0.85rem; }
  .message .date { color: #555; font-size: 0.7rem; float: right; }
  .message .body { margin-top: 6px; font-size: 0.9rem; }
  .back { color: #555; text-decoration: none; font-size: 0.8rem; }
  .back:hover { color: #00ff41; }
</style>
</head>
<body>
<div class="container">
  <h2>Tablon de Mensajes</h2>
  <div class="hint">Vuln: XSS Stored &mdash; Payload: &lt;script&gt;alert('XSS')&lt;/script&gt;</div>
  <div class="post-form">
    <form method="POST">
      <label>Autor</label>
      <input type="text" name="author" placeholder="Tu nombre">
      <label>Mensaje</label>
      <textarea name="content" placeholder="Escribe un mensaje..."></textarea>
      <button type="submit">Publicar</button>
    </form>
  </div>
  {% for msg in messages %}
  <div class="message">
    <span class="author">{{ msg['author'] }}</span>
    <span class="date">{{ msg['created_at'] }}</span>
    <div class="body">{{ msg['content'] | safe }}</div>
  </div>
  {% endfor %}
  <br><a class="back" href="/">Volver al menu</a>
</div>
</body>
</html>
